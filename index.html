<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>WebRTC Screen Sharing & Recording</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel='stylesheet' type='text/css' media='screen' href='styles.css'>
    <link rel='stylesheet' type='text/css' media='screen' href='video-fix.css'>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
<div class="container-fluid vh-100">
    <header class="bg-secondary text-white p-3 mb-3">
        <div class="d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0"><i class="fas fa-video me-2"></i>WebRTC Studio</h1>
            <div class="status-indicators">
                <span class="badge bg-danger me-2" id="camera-status">
                    <i class="fas fa-video-slash"></i> Camera Off
                </span>
                <span class="badge bg-danger" id="mic-status">
                    <i class="fas fa-microphone-slash"></i> Mic Off
                </span>
            </div>
        </div>
    </header>

    <div class="row h-100">
        <!-- Control Panel -->
        <aside class="col-lg-3 col-md-4 bg-dark text-white p-3 overflow-auto">
            <!-- Camera Controls -->
            <section class="mb-4">
                <h5 class="text-info mb-3"><i class="fas fa-camera me-2"></i>Camera Controls</h5>
                <div class="d-grid gap-2 mb-3">
                    <button id="share" class="btn btn-primary">
                        <i class="fas fa-video me-2"></i>Share Camera & Mic
                    </button>
                    <button id="show-video" class="btn btn-success">
                        <i class="fas fa-play me-2"></i>Show My Video
                    </button>
                    <button id="stop-video" class="btn btn-danger">
                        <i class="fas fa-stop me-2"></i>Stop Video
                    </button>
                </div>
            </section>

            <!-- Screen Sharing -->
            <section class="mb-4">
                <h5 class="text-info mb-3"><i class="fas fa-desktop me-2"></i>Screen Sharing</h5>
                <div class="d-grid gap-2 mb-3">
                    <button id="share-screen" class="btn btn-purple">
                        <i class="fas fa-share-square me-2"></i>Share Screen
                    </button>
                </div>
            </section>

            <!-- Recording Controls -->
            <section class="mb-4">
                <h5 class="text-info mb-3"><i class="fas fa-record-vinyl me-2"></i>Recording</h5>
                <div class="d-grid gap-2 mb-3">
                    <button id="start-record" class="btn btn-danger">
                        <i class="fas fa-circle me-2"></i>Start Recording
                    </button>
                    <button id="stop-record" class="btn btn-warning">
                        <i class="fas fa-stop-circle me-2"></i>Stop Recording
                    </button>
                    <button id="play-record" class="btn btn-success">
                        <i class="fas fa-play me-2"></i>Play Recording
                    </button>
                </div>
            </section>

            <!-- Video Settings -->
            <section class="mb-4">
                <h5 class="text-info mb-3"><i class="fas fa-cog me-2"></i>Video Settings</h5>
                <div class="mb-3">
                    <label class="form-label small">Resolution</label>
                    <div class="input-group input-group-sm">
                        <input type="number" id="vid-width" class="form-control" value="1280" placeholder="Width"/>
                        <span class="input-group-text">×</span>
                        <input type="number" id="vid-height" class="form-control" value="720" placeholder="Height"/>
                        <button id="change-size" class="btn btn-outline-secondary">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Device Selection -->
            <section class="mb-4">
                <h5 class="text-info mb-3"><i class="fas fa-sliders-h me-2"></i>Device Selection</h5>
                <div class="mb-2">
                    <label class="form-label small">Audio Input</label>
                    <select id="audio-input" class="form-select form-select-sm"></select>
                </div>
                <div class="mb-2">
                    <label class="form-label small">Audio Output</label>
                    <select id="audio-output" class="form-select form-select-sm"></select>
                </div>
                <div class="mb-2">
                    <label class="form-label small">Video Input</label>
                    <select id="video-input" class="form-select form-select-sm"></select>
                </div>
            </section>
        </aside>

        <!-- Video Area -->
        <main class="col-lg-9 col-md-8 p-3">
            <div class="row h-100 g-3">
                <!-- My Video -->
                <div class="col-12 col-lg-6">
                    <div class="video-container h-100">
                        <div class="video-header bg-secondary text-white p-2 d-flex justify-content-between align-items-center">
                            <span><i class="fas fa-user me-2"></i>My Feed</span>
                            <div class="video-controls">
                                <span class="badge bg-success" id="my-feed-status">Live</span>
                            </div>
                        </div>
                        <div class="video-wrapper">
                            <video id="my-video" class="video-element" autoplay playsinline muted></video>
                            <div class="video-placeholder" id="my-video-placeholder">
                                <i class="fas fa-user-circle fa-5x text-muted"></i>
                                <p class="text-muted mt-2">Camera not active</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Remote/Recorded Video -->
                <div class="col-12 col-lg-6">
                    <div class="video-container h-100">
                        <div class="video-header bg-secondary text-white p-2 d-flex justify-content-between align-items-center">
                            <span><i class="fas fa-users me-2"></i>Remote Feed</span>
                            <div class="video-controls">
                                <span class="badge bg-secondary" id="remote-feed-status">Waiting</span>
                            </div>
                        </div>
                        <div class="video-wrapper">
                            <video id="other-video" class="video-element" autoplay playsinline controls></video>
                            <div class="video-placeholder" id="other-video-placeholder">
                                <i class="fas fa-desktop fa-5x text-muted"></i>
                                <p class="text-muted mt-2">No remote feed</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src='scripts.js'></script>
<script src='changeButtons.js'></script>
<script src='changeVideoSize.js'></script>
<script src='screenRecorder.js'></script>
<script src='shareScreen.js'></script>
<script src='inputOutput.js'></script>
</body>
</html>
